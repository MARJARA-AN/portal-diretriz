<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Diretriz - Alunos</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #1a252f; }
        .error { color: var(--accent); font-size: 0.9rem; margin-top: 10px; display: none; }
        #portal { display: none; max-width: 800px; width: 90%; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .nav-btn { background: #eee; color: #333; padding: 8px 15px; cursor: pointer; border-radius: 5px; }
        .nav-btn.active { background: var(--primary); color: white; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: left; }
        .admin-only { display: none; background: #fff3f3; border: 1px solid #f8d7da; }
    </style>
</head>
<body>

    <div id="login-box" class="container">
        <h1>Portal Diretriz</h1>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="execLogin()">Entrar</button>
        <p id="error" class="error">Usuário ou senha incorretos!</p>
    </div>

    <div id="portal">
        <div class="nav">
            <div class="nav-btn active" onclick="tab('painel')">Meu Painel</div>
            <div id="btn-gestao" class="nav-btn admin-only" onclick="tab('gestao')">Gestão de Alunos</div>
            <div class="nav-btn" onclick="location.reload()">Sair</div>
        </div>

        <div id="painel" class="card">
            <h2 id="boas-vindas">Bem-vindo!</h2>
            <p>Aqui você verá suas notas e faltas em breve.</p>
        </div>

        <div id="gestao" class="card admin-only">
            <h2>Painel da Professora Marj</h2>
            <p>Lista de Alunos Conectados:</p>
            <ul id="lista-alunos"></ul>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DO SEU FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAv_AZR3SyLicdEmlkO4ewaCDOO4R7Uaag",
  authDomain: "portaldiretriz-1ec00.firebaseapp.com",
  databaseURL: "https://portaldiretriz-1ec00-default-rtdb.firebaseio.com/",
  projectId: "portaldiretriz-1ec00",
  storageBucket: "portaldiretriz-1ec00.firebasestorage.app",
  messagingSenderId: "685027893199",
  appId: "1:685027893199:web:9acaf1d44bef1d3a12bcba",
  measurementId: "G-H96S5NF5M4"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Lista de Alunos Permitidos
        const ALUNOS_IDS = ['herto', 'bruno', 'elisabelle', 'elisabeth', 'beatriz', 'eglany', 'flavia', 'patricia'];
        let db = { alunos: {} };

        // Sincroniza com o Banco de Dados
        database.ref('diretriz_db').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                db = data;
                console.log("Dados carregados!");
            } else {
                // Cria os alunos se o banco estiver vazio
                ALUNOS_IDS.forEach(id => {
                    db.alunos[id] = { nome: id.charAt(0).toUpperCase() + id.slice(1), faltas: 0 };
                });
                database.ref('diretriz_db').set(db);
            }
            atualizarListaGestao();
        });

        function execLogin() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;

            if (u === 'marj' && p === '12345') {
                abrirPortal('admin');
            } else if (ALUNOS_IDS.includes(u) && p === '1234') {
                abrirPortal(u);
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        function abrirPortal(tipo) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('portal').style.display = 'block';
            
            if (tipo === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.getElementById('boas-vindas').innerText = "Olá, Professora Marj!";
            } else {
                document.getElementById('boas-vindas').innerText = "Olá, " + tipo.toUpperCase() + "!";
            }
        }

        function tab(id) {
            document.getElementById('painel').style.display = 'none';
            document.getElementById('gestao').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function atualizarListaGestao() {
            const lista = document.getElementById('lista-alunos');
            if(!lista) return;
            lista.innerHTML = "";
            Object.keys(db.alunos).forEach(id => {
                lista.innerHTML += `<li><strong>${id.toUpperCase()}</strong> - Faltas: ${db.alunos[id].faltas}</li>`;
            });
        }
    </script>
</body>
</html>
